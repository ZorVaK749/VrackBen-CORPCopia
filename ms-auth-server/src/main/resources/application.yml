server:
  port: 8083

spring:
  application:
    name: ms-auth-server
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/vrakben_db
    username: user_vrakben
    password: password_vrakben
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
