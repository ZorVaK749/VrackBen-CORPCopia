# Secrets de Kubernetes para VrakBen
# IMPORTANTE: Los valores deben estar codificados en Base64
# Para codificar: echo -n "mi_valor" | base64
# Aplicar con: kubectl apply -f k8s/02-secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: vrakben-db-secret
  namespace: vrakben
type: Opaque
data:
  # echo -n "vrakben_db" | base64
  db-name: dnJha2Jlbl9kYg==
  # echo -n "user_vrakben" | base64
  db-user: dXNlcl92cmFrYmVu
  # echo -n "password_vrakben" | base64
  db-password: cGFzc3dvcmRfdnJha2Jlbg==

---

apiVersion: v1
kind: Secret
