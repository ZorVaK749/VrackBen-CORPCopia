name: Deploy Frontend to AWS ECS

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch: # Permite ejecución manual

env:
  AWS_REGION: us-east-1                   # TODO: Reemplaza con tu región
  ECR_REPOSITORY: vrakben-frontend-lite   # TODO: Reemplaza con tu repo de ECR
  ECS_CLUSTER: vrakben-cluster            # TODO: Reemplaza con tu clúster ECS
  ECS_SERVICE: vrakben-frontend-service   # TODO: Reemplaza con tu servicio ECS

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Obligatorio en AWS Academy
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        # Se requiere este secret configurado en el repo de GitHub:
        VITE_API_BACKEND_URL: ${{ secrets.VITE_API_BACKEND_URL }}
      working-directory: ./frontend
      run: |
        # Build pasándole la URL del backend al frontend de Vite
        docker build --build-arg VITE_API_BACKEND_URL=$VITE_API_BACKEND_URL -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        
        # Etiquetar también como 'latest' para facilitar el reinicio en ECS
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Subir ambas etiquetas
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Force new ECS deployment
      # En AWS Academy no siempre tienes permisos para crear nuevas versiones de Task Definitions.
      # Actualizar el servicio para que jale la nueva imagen 'latest' es la forma más segura.
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment
