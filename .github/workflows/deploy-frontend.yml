name: Deploy Frontend to ECS

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  AWS_REGION:         us-east-1
  ECR_REPOSITORY:     vrakben-frontend
  ECS_CLUSTER:        cluster-vrakben-lean1
  ECS_SERVICE:        task-frontend-service-5gyxrurt
  CONTAINER_NAME:     frontend
  TASK_DEFINITION:    .aws/task-definition-frontend.json
  # URL del ALB donde vive el BFF (cambiar si la URL del balanceador cambia)
  VITE_API_BASE_URL:  http://alb-vrakben-lean-1845164243.us-east-1.elb.amazonaws.com

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          # VITE_API_BASE_URL se inyecta como build-arg para que Vite la embeba
          docker build \
            --build-arg VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f frontend/Dockerfile ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render new ECS task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS (force new deployment)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:         ${{ steps.render-task-def.outputs.task-definition }}
          service:                 ${{ env.ECS_SERVICE }}
          cluster:                 ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
