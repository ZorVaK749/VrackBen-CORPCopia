server:
  port: 8084

spring:
  application:
    name: catalog-lite

  # ===== BASE DE DATOS EN MEMORIA (H2) =====
  # Sin PostgreSQL, sin Redis, sin contenedores externos.
  datasource:
    url: jdbc:h2:mem:catalogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # Crea las tablas al arrancar, las borra al parar
    show-sql: false

  # data.sql se ejecuta automáticamente al arrancar para cargar datos mock
  sql:
    init:
      mode: always

  # ===== H2 CONSOLE (solo para debug local, desactivar en prod) =====
  h2:
    console:
      enabled: false

# ===== ACTUATOR (Health check para ECS / ALB Target Group) =====
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# ===== UPLOAD DE IMAGENES (mantiene compatibilidad con el endpoint existente) =====
catalog:
  upload:
    dir: /tmp/catalog-uploads
  server:
    url: ${BACKEND_PUBLIC_URL:http://localhost:8084}

# ELIMINADO: eureka.client.*
# ELIMINADO: spring.data.redis.*
# ELIMINADO: spring.cache.*