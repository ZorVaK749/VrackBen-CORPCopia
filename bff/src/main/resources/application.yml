server:
  port: 8080

spring:
  application:
    name: bff
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-server-route
          uri: http://${AUTH_HOST:localhost}:${AUTH_PORT:8083}
          predicates:
            - Path=/api/auth/**

        - id: catalog-route
          uri: http://${CATALOG_HOST:localhost}:${CATALOG_PORT:8084}
          predicates:
            - Path=/api/catalog/**
          filters:
            - JwtAuthentication

        - id: stock-engine-route
          uri: http://${STOCK_HOST:localhost}:${STOCK_PORT:8085}
          predicates:
            - Path=/api/stock/**
          filters:
            - JwtAuthentication=ROLE_ADMIN

        - id: supplier-procurement-route
          uri: http://${PROCUREMENT_HOST:localhost}:${PROCUREMENT_PORT:8088}
          predicates:
            - Path=/api/procurement/**
          filters:
            - JwtAuthentication=ROLE_ADMIN

        - id: job-orders-route
          uri: http://${JOB_ORDERS_HOST:localhost}:${JOB_ORDERS_PORT:8086}
          predicates:
            - Path=/api/job-orders/**
          filters:
            - JwtAuthentication

        - id: shopping-cart-route
          uri: http://${CART_HOST:localhost}:${CART_PORT:8082}
          predicates:
            - Path=/api/cart/**
          filters:
            - JwtAuthentication

        - id: appointment-route
          uri: http://${APPOINTMENT_HOST:localhost}:${APPOINTMENT_PORT:8089}
          predicates:
            - Path=/api/appointments/**
          filters:
            - JwtAuthentication

        - id: vehicle-history-route
          uri: http://${HISTORY_HOST:localhost}:${HISTORY_PORT:8090}
          predicates:
            - Path=/api/history/**
          filters:
            - JwtAuthentication

        - id: order-management-route
          uri: http://${ORDER_HOST:localhost}:${ORDER_PORT:8087}
          predicates:
            - Path=/api/orders/**
          filters:
            - JwtAuthentication

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    enabled: false

logging:
  level:
    org.springframework.cloud.gateway: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"
