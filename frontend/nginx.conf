# =============================================================
# VraKBen Frontend Lite — Nginx Configuration
# Optimizado para servir una Single Page Application (SPA) React.
# =============================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Compresión Gzip ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── SPA Routing ────────────────────────────────────────────
    # CRÍTICO: sin esto, cualquier ruta distinta a "/" da 404 en Nginx.
    # React Router maneja la navegación del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache de assets estáticos ──────────────────────────────
    # Los archivos con hash en el nombre (ej: main.abc123.js)
    # se pueden cachear de forma agresiva.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check para ECS / ALB ────────────────────────────
    # El Target Group de ECS puede hacer ping a /health
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Seguridad básica ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Ocultar versión de Nginx ───────────────────────────────
    server_tokens off;

    # ── Manejo de errores ──────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
